# Nginx config for DEV/STAGING - dev.learnwithus.sbs
# Add this server block alongside production. Dev backend runs on port 5001.

upstream shef_lms_backend_dev {
    server localhost:5001;
}

server {
    listen 80;
    server_name dev.learnwithus.sbs;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dev.learnwithus.sbs;

    # Notes uploads are capped at 10MB in the app, but multipart requests need
    # a little extra headroom so nginx does not reject them before Express.
    client_max_body_size 12M;

    ssl_certificate /etc/letsencrypt/live/dev.learnwithus.sbs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.learnwithus.sbs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /var/www/shef-lms-dev;
    index index.html;

    location /api {
        proxy_pass http://shef_lms_backend_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_cache_bypass $http_upgrade;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
